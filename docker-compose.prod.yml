# ============================================
# Docker Compose - apps/api 프로덕션 배포용
# ============================================


services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: nearbybook-api:latest
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
    expose:
      - "8000"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-8000}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MEILISEARCH_HOST=${MEILISEARCH_HOST}
      - MEILISEARCH_SEARCH_API_KEY=${MEILISEARCH_SEARCH_API_KEY}
      - MEILISEARCH_ADMIN_API_KEY=${MEILISEARCH_ADMIN_API_KEY}
      - LIBRARY_BIGDATA_API_KEY=${LIBRARY_BIGDATA_API_KEY}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID}
      - NAVER_SECRET=${NAVER_SECRET}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
